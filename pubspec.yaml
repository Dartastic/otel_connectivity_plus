name: otel_connectivity_plus
description: OpenTelemetry instrumentation for `package:connectivity_plus`.
  Bridges connectivity changes into OTel as events on the active span.
version: 0.1.0-beta.1-wip
repository: https://github.com/dartastic/otel_connectivity_plus
homepage: https://dartastic.io

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  connectivity_plus: ^6.0.0
  dartastic_opentelemetry: ^1.1.0-beta.4
  dartastic_opentelemetry_api: ^1.0.0-beta.6
  flutter:
    sdk: flutter

dev_dependencies:
  dart_flutter_team_lints: ^3.5.2
  flutter_test:
    sdk: flutter
  pub_semver: ^2.0.0
  pubspec_parse: ^1.5.0
